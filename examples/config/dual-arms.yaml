# Telerobot Configuration
# Copy this file to config.yaml and adjust to match your setup.

robot:
  id: duo_robot
  fps: 30
  use_rerun: false  # set to true to enable the Rerun viewer

cameras:
  left_wrist:
    index: 1
    width: 640
    height: 480
  right_wrist:
    index: 0
    width: 640
    height: 480
  main:
    index: 2
    width: 640
    height: 480

arms:
  left:
    type: so100
    port: /dev/tty.usbmodem5A460842561
    use_degrees: true
    cameras: [left_wrist, right_wrist, main]   # which cameras are attached to this arm
    regularization: 1.0e-3
    end_effector_step_sizes: { x: 0.8, y: 0.8, z: 0.8 }
    end_effector_bounds:
      min: [-1.0, -1.0, -1.0]
      max: [1.0, 1.0, 1.0]
    max_ee_step_m: 0.20
    gripper_speed_factor: 20.0
  right:
    type: so100
    port: /dev/tty.usbmodem5A7C1167181
    use_degrees: true
    cameras: []
    regularization: 1.0e-3
    end_effector_step_sizes: { x: 0.8, y: 0.8, z: 0.8 }
    end_effector_bounds:
      min: [-1.0, -1.0, -1.0]
      max: [1.0, 1.0, 1.0]
    max_ee_step_m: 0.20
    gripper_speed_factor: 20.0

# Uncomment to enable episode recording to a LeRobot dataset
#   dataset:
#     repo_id: "<YOUR_HF_USERNAME>/vr_test_dual_arms"
#     single_task: "Grab the cube"
#     push_to_hub: true  # set to true to push the dataset to Hugging Face Hub on save
#     # root: "./datasets"  # optional: override dataset storage path

